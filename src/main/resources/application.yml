server:
  port: 8080

spring:
  application:
    name: knowledge-hub

  # --- 1. НАСТРОЙКИ НА БАЗАТА ДАННИ ---
  datasource:
    url: jdbc:postgresql://localhost:5435/knowledge_db
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  # --- 2. HIBERNATE / JPA (Връзката между Java и SQL) ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  # --- 3. ЛИМИТИ ЗА КАЧВАНЕ НА ФАЙЛОВЕ ---
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # --- 4. SPRING AI НАСТРОЙКИ ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-3.5-turbo

    # Настройки за ВЕКТОРИ (Локално генериране с ONNX / Transformers)
    # Ако ползваш 'spring-ai-transformers', то обикновено работи автоматично.
    # Тук изрично казваме да НЕ ползва OpenAI за вектори, за да е безплатно.
    embedding:
      transformer:
        enabled: true  # Включва локалния модел (all-MiniLM-L6-v2)

# --- 5. LOGGING (Да виждаме какво става) ---
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE